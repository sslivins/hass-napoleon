name: Unit Tests

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[tests]
      - name: Lint (ruff)
        run: ruff check custom_components/napoleon tests
      - name: Type check (mypy)
        run: mypy custom_components/napoleon
      - name: Run unit tests with coverage
        run: pytest --cov=custom_components/napoleon --cov-report=term-missing --cov-fail-under=80
