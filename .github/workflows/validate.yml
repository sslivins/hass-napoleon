name: Validate

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  schedule:
    - cron: "0 6 * * *"

jobs:
  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    # TODO: remove continue-on-error once pynapoleon is published to PyPI.
    # HACS validates manifest.json requirements against PyPI; until
    # pynapoleon is published, this check fails. Tracked separately.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
